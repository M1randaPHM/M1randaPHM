<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>The Gilded Nocturne | LinkedIn ainda não disponível</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Fontes e Ícones (Removido os links duplicados) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Configuração do Tailwind (Mantida pois as cores customizadas estão em uso) -->
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
                "surface-variant": "#353535", "secondary-fixed-dim": "#dac58d", "on-primary-fixed": "#241a00", "surface-dim": "#131313",
                "tertiary-fixed-dim": "#b4c5ff", "on-tertiary-fixed-variant": "#27438a", "inverse-surface": "#e2e2e2", "secondary-container": "#544519",
                "on-tertiary-fixed": "#00174b", "on-surface-variant": "#d0c5af", "surface-container-lowest": "#0e0e0e", "on-error": "#690005",
                "on-secondary": "#3c2f05", "primary-container": "#d4af37", "on-secondary-container": "#c8b37d", "primary-fixed-dim": "#e9c349",
                "outline-variant": "#4d4635", "on-surface": "#e2e2e2", "background": "#131313", "on-tertiary-container": "#254188",
                "tertiary-fixed": "#dbe1ff", "surface-container": "#1f1f1f", "on-primary-fixed-variant": "#574500", "on-primary-container": "#554300",
                "on-tertiary": "#082b72", "surface-bright": "#393939", "tertiary-container": "#97b0ff", "on-background": "#e2e2e2",
                "primary": "#f2ca50", "on-secondary-fixed-variant": "#544519", "inverse-on-surface": "#303030", "error-container": "#93000a",
                "surface": "#131313", "surface-container-highest": "#353535", "on-error-container": "#ffdad6", "surface-container-high": "#2a2a2a",
                "inverse-primary": "#735c00", "error": "#ffb4ab", "outline": "#99907c", "secondary-fixed": "#f7e1a6", "surface-tint": "#e9c349",
                "on-primary": "#3c2f00", "on-secondary-fixed": "#241a00", "secondary": "#dac58d", "primary-fixed": "#ffe088",
                "surface-container-low": "#1b1b1b", "tertiary": "#bfcdff"
            },
            fontFamily: {
                "headline": ["Noto Serif", "serif"],
                "body": ["Manrope", "sans-serif"]
            }
          },
        },
      }
    </script>

    <style>
        body {
            background-color: #000000;
            color: #e2e2e2;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
        .gilded-glow {
            text-shadow: 0 0 20px rgba(242, 202, 80, 0.35);
        }
        .ambient-radial {
            background: radial-gradient(circle at center, rgba(242, 202, 80, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
        }
    </style>
</head>

<!-- Body agora pega a tela inteira de forma limpa -->
<body class="antialiased w-full h-screen relative">

    <!-- Fundo de Luz Ambiente -->
    <div class="absolute inset-0 ambient-radial pointer-events-none z-0"></div>

    <!-- Container Principal (Responsável pela centralização real) -->
    <main class="relative z-10 w-full h-full flex items-center justify-center px-6">
        
        <!-- Conteúdo -->
        <section class="max-w-3xl mx-auto flex flex-col items-center text-center">
            
            <!-- Linha Decorativa Dourada -->
            <div class="w-[1px] h-12 bg-[#e9c349] mb-8 opacity-50"></div>
            
            <!-- Tag de Notificação -->
            <span class="font-['Manrope'] text-primary font-bold uppercase tracking-[0.4em] text-xs mb-6">
                Notificação do Sistema
            </span>
            
            <!-- Título Principal -->
            <h1 class="font-headline text-4xl md:text-6xl lg:text-7xl font-bold tracking-tighter text-on-surface gilded-glow mb-6 leading-tight">
                LinkedIn ainda não disponível
            </h1>
            
            <!-- Texto Explicativo -->
            <p class="font-body text-base md:text-xl text-on-surface-variant leading-relaxed mb-12 opacity-80 max-w-2xl">
                Meu perfil no LinkedIn ainda está em desenvolvimento. Em breve, estará disponível com mais informações sobre minha trajetória.
            </p>
            
            <!-- Divisor de Estrela -->
            <div class="flex flex-col items-center gap-10">
                <div class="flex items-center gap-6">
                    <div class="w-16 h-[1px] bg-outline-variant opacity-40"></div>
                    <span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
                    <div class="w-16 h-[1px] bg-outline-variant opacity-40"></div>
                </div>

                <!-- Botão de Retorno (Adicionado para usabilidade) -->
                <a href="#" onclick="history.back(); return false;" class="px-8 py-3 border border-primary/50 text-primary rounded-full hover:bg-primary hover:text-black transition-all duration-300 font-['Manrope'] text-sm tracking-widest uppercase font-semibold">
                    Voltar
                </a>
            </div>

        </section>
    </main>

</body>
</html>
